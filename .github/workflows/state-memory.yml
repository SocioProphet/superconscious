name: state-memory

on:
  pull_request:
    branches: [ main ]
    paths:
      - "examples/runtime-state-memory-event.*.json"
      - "scripts/validate-runtime-state-memory.py"
      - ".github/workflows/state-memory.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-state-memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate state memory fixtures
        run: python3 scripts/validate-runtime-state-memory.py
