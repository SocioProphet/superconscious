name: lawful-learning-t2-prime

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/check-lawful-learning-t2-prime.py
      - run: python3 harness/coxeter_a2_harness.py --check
      - run: python3 harness/fuss_catalan_verification.py --check
      - run: |
          if python3 scripts/check-lawful-learning-t2-prime.py --t2 tests/fixtures/lawful-learning/t2-prime-predicate-interpretation.missing-zeta.invalid.json; then
            echo "invalid T2 prime fixture unexpectedly passed"
            exit 1
          fi
          echo "invalid T2 prime fixture correctly rejected"
      - run: |
          if python3 scripts/check-lawful-learning-t2-prime.py --a2 tests/fixtures/lawful-learning/a2-gate-minimality-scoping.promoted.invalid.json; then
            echo "invalid A2 scoping fixture unexpectedly passed"
            exit 1
          fi
          echo "invalid A2 scoping fixture correctly rejected"
