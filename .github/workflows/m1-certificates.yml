name: Certificate Doctrine CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  certificate-static-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install schema validator
        run: python3 -m pip install jsonschema
      - name: Run certificate static and smoke checks
        run: make certificate-ci
      - name: Upload certificate smoke artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: certificate-ci-artifacts
          path: outputs/
          if-no-files-found: ignore
