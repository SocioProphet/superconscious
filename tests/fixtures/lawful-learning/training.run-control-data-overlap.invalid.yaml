# Invalid: control and data planes share a component without a boundary interface.
# Violates control_data_plane_separation.
may_wigner_monitor:
  monitor_name: synthetic_stability_monitor
  monitored_quantity: "sigma * sqrt(N * C) analogue"
  checkpoint_interval: every_1000_steps
  threshold_declaration: "0.8 warning, 1.0 halt"
control_plane_components:
  - mixture_router
  - shared_gate
data_plane_components:
  - expert_mlp_0
  - shared_gate
boundary_interfaces: []
expected_case_coverage: "standard benchmark eval suite"
tail_allocation_strategy: "tail audit allocation present"
tail_scope_declaration: "tail events"
continuation_rule: "continue after sufficient condition"
run_log:
  sufficient_conditions_met: []
  continuation_applied: false
event_log: []
